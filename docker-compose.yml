services:
  jseccomp:
    build: .
    volumes:
      - .:/workspace
    # Use our custom seccomp profile that whitelists filter stacking
    # rather than running completely unconfined in production.
    security_opt:
      - seccomp=./docker-seccomp.json
    working_dir: /workspace
    # Default to keeping the container alive for execution
    command: tail -f /dev/null
