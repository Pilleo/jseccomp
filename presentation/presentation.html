<title>The Labyrinth of Zero-Trust</title>
<style>
  body {
    margin: 0;
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #fff;
  }
  .controls {
    margin: 20px 0 10px 0;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls button {
    background: #16213e;
    border: 1.5px solid #4a4a6a;
    color: #8892b0;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: monospace;
    font-size: 12px;
    transition: all 0.2s;
  }
  .controls button:hover {
    background: #1a1a2e;
    border-color: #4ecdc4;
    color: #4ecdc4;
  }
  .controls button.active {
    background: #4ecdc4;
    color: #0d1117;
    border-color: #4ecdc4;
    font-weight: bold;
  }
  .slide-title {
    font-size: 14px;
    color: #4ecdc4;
    margin-bottom: 8px;
    text-align: center;
  }
  .context-box {
    max-width: 1100px;
    background: #16213e;
    border: 1px solid #4a4a6a;
    border-radius: 6px;
    padding: 14px 20px;
    margin-top: 12px;
    font-size: 12px;
    color: #8892b0;
    line-height: 1.7;
  }
  .context-box em { color: #4ecdc4; font-style: normal; }
  .context-box strong { color: #e0e0e0; }
  svg { border-radius: 8px; border: 1px solid #4a4a6a; }
  .nav-hint { font-size: 10px; color: #4a4a6a; margin-top: 6px; }
</style>
</head>

<script>
const slides = [
  {
    title: "SLIDE 1: The Naked Application — The Unrestricted Maze",
    context: "<strong>Developer Context:</strong> Without behavior mapping, a container is an open field. The maze walls represent code module boundaries — they exist structurally but provide zero runtime enforcement. An RCE exploit cuts diagonally through the dependency tree, reaches the kernel, and successfully calls <em>execve()</em> to spawn a shell. The application has no say in what syscalls its process can make.",
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'redAttackSlide1', 'syscalls', 'legend'],
    hide: ['hardenedWalls', 'execveDenied', 'redAttackSlide2', 'startupBulkhead', 'shutdownGate', 'redAttackSlide3', 'stacktraceEnforcement', 'threadScope']
  },
  {
    title: "SLIDE 2: The General App BoB — Kernel-Level Whitelist",
    context: "<strong>Developer Context:</strong> The General SBoB profiles the container's aggregate allowed behaviors and enforces them via eBPF at the kernel level. The attack still traverses the broad internal corridors (the <em>Merge Fallacy</em> — hundreds of dependencies merged into one profile). But when it reaches the kernel and attempts <em>execve()</em>, the syscall is <strong>not in the whitelist</strong> and is denied. The key insight: enforcement happens in the kernel, not in user-space. The attack reaches the boundary but chokes at the syscall gate.",
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'hardenedWalls', 'execveDenied', 'redAttackSlide2', 'syscalls', 'legend'],
    hide: ['redAttackSlide1', 'startupBulkhead', 'shutdownGate', 'redAttackSlide3', 'stacktraceEnforcement', 'threadScope']
  },
  {
    title: "SLIDE 3: Lifecycle Partitioning — Temporal Denial",
    context: "<strong>Developer Context:</strong> Even with <em>execve()</em> denied, an attacker might try <em>dlopen()</em> to load a malicious shared library. During Startup, <em>dlopen()</em> is legitimately needed (native libs, JDBC drivers). But once the Kubernetes readiness probe passes, the Startup phase is sealed. The eBPF profile <strong>drops dlopen() from the whitelist entirely</strong> for the Runtime phase. The attack reaches the kernel, calls <em>dlopen()</em>, and gets phase-denied. Similarly, the Startup zone's capabilities (secret reading, class loading) become permanently inaccessible.",
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'blueThread', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'redAttackSlide3', 'syscalls', 'legend'],
    hide: ['redAttackSlide1', 'redAttackSlide2', 'stacktraceEnforcement', 'threadScope']
  },
  {
    title: "SLIDE 4: Stacktrace Enforcement — Call-Path Binding",
    context: "<strong>Developer Context:</strong> The General BoB allows <em>read()</em> because many modules need it. But <em>which</em> code path triggered it? With GraalVM native images and DWARF symbols, we can bind allowed syscalls to exact call stacks. The green dashed line shows the expected path: <em>Controller → Service → FileUtil → read()</em>. The red attack achieves RCE, hijacks execution via an ROP chain through the Logging library, and also calls <em>read()</em> — but its actual call stack doesn't match. The kernel-level DWARF validator compares stacks at syscall entry and rejects the mismatch. This eliminates all code-path hijacking where the attacker can't forge the exact expected stack.",
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'stacktraceEnforcement', 'syscalls', 'legend'],
    hide: ['redAttackSlide1', 'redAttackSlide2', 'redAttackSlide3', 'blueThread', 'threadScope']
  },
  {
    title: "SLIDE 5: Thread-Scoped Context — Defeating the Confused Deputy",
    context: "<strong>Developer Context:</strong> The stacktrace matches perfectly: <em>DownloadController → File.read()</em>. This is the legitimate code path — but the user supplied <em>../../etc/passwd</em> as input. The code is not hijacked; it's tricked. This is the <em>Confused Deputy</em> problem, and stacktrace enforcement cannot catch it.<br><br>The solution: the application runtime pushes <strong>dynamic thread context</strong> (user role, tenant ID, allowed paths) into an eBPF-readable kernel map. At syscall entry, the kernel checks not just <em>what</em> code called it, but <em>on whose behalf</em> and <em>with what data boundaries</em>.<br><br><strong>Concrete examples where this outperforms stacktrace:</strong><br>• A JSON parser thread scoped to only <em>read()</em> from its input buffer — even if vulnerable, it can't open arbitrary files<br>• A download endpoint where <em>user_role=guest</em> can only <em>openat()</em> within <em>/public/</em><br>• Multi-tenant apps where each request thread carries tenant-id and cross-tenant resource access is rejected at the kernel layer",
    show: ['startupZone', 'shutdownZone', 'entryPoint', 'mazeWallsExtra', 'hardenedWalls', 'execveDenied', 'startupBulkhead', 'shutdownGate', 'threadScope', 'syscalls', 'legend'],
    hide: ['redAttackSlide1', 'redAttackSlide2', 'redAttackSlide3', 'blueThread', 'stacktraceEnforcement']
  }
];

let currentSlide = 0;

function goToSlide(index) {
  currentSlide = index;
  const slide = slides[index];

  document.getElementById('slideTitle').textContent = slide.title;
  document.getElementById('contextBox').innerHTML = slide.context;

  for (let i = 0; i < 5; i++) {
    document.getElementById('btn' + i).classList.remove('active');
  }
  document.getElementById('btn' + index).classList.add('active');

  slide.hide.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.transition = 'opacity 0.5s ease';
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    }
  });

  slide.show.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.style.transition = 'opacity 0.6s ease 0.15s';
      el.style.opacity = '1';
      el.style.pointerEvents = 'auto';
    }
  });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentSlide < 4) goToSlide(currentSlide + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentSlide > 0) goToSlide(currentSlide - 1);
  }
});

goToSlide(0);
</script>
